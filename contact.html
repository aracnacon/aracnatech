  <body class="page-aracnatech">

    <header>
      <img src="images/profile/MeHeadSun.jpeg" alt="Profile photo of Brandon" width="200" height="200" />
      <h1><i class="fa-solid fa-spider"></i> AracnaTech</h1>
      <p class="typewriter" data-text="Let's figure out what your team needs."></p>
    </header>

    <nav>
      <a href="index.html">AracnaTech</a>
      <a href="webcompare.html">Live Comparison</a>
      <a href="https://aracnacon.github.io" target="_blank">Portfolio</a>
      <a href="#" class="theme-toggle" aria-label="Change theme"><i class="fa-solid fa-palette"></i></a>
    </nav>

    <main>

      <section class="gs-reveal">
        <h2>Get in Touch</h2>
        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="b3266e06-aea0-40b0-ae30-57e058c48600" />
          <input type="hidden" name="redirect" value="https://aracnatech.io/thanks.html" />
          <input type="hidden" name="subject" value="New message from AracnaTech website" />
          <input type="checkbox" name="botcheck" class="hidden" style="display: none;" />

          <label for="name">Name:</label><br />
          <input type="text" id="name" name="name" placeholder="Your name" required /><br /><br />

          <label for="email">Email:</label><br />
          <input type="email" id="email" name="email" placeholder="Your email" required /><br /><br />

          <label for="company">Company / Organization:</label><br />
          <input type="text" id="company" name="company" placeholder="Optional" /><br /><br />

          <label for="message">Message:</label><br />
          <textarea id="message" name="message" rows="4" cols="40" placeholder="Tell us about the problem you're trying to solve." required></textarea><br /><br />

          <button type="submit">Send</button>
        </form>
      </section>

      <section class="gs-reveal">
        <h2>More About Me</h2>
        <p>
          See the rest of my work, experience, and projects at
          <a href="https://aracnacon.github.io" target="_blank" style="color: var(--color-primary);">aracnacon.github.io</a>.
        </p>
        <div class="social-row" style="justify-content: center; margin-top: 15px;">
          <div class="social-links">
            <a href="mailto:brandon.hixson@aracnatech.com"><i class="fa-solid fa-spider"></i> brandon.hixson@aracnatech.com</a>
            <a href="https://github.com/aracnacon"><i class="fa-brands fa-github"></i> GitHub</a>
            <a href="https://linkedin.com/in/brandonhixson"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
          </div>
        </div>
      </section>
